<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrils Weather</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A5C8A">
    <meta name="app-version" content="__APP_VERSION__">
    <link rel="stylesheet" href="style.css?v=__APP_VERSION__">
</head>
<body>

    <header>
        <h1>Cambrils Weather</h1>
        <p class="header-subtitle">Live Forecast</p>
        <a href="index.html" class="today-btn">&#8592; Back to Calendar</a>
    </header>

    <div class="weather-container">
        
        <div class="current-weather-card">
            <h3>Weather Right Now</h3>
            
            <div id="loadingText" class="weather-status">Loading the forecast…</div>
            
            <div id="weatherContent" style="display:none;">
                
                <div class="temp-big" id="currentTemp">--°</div>
                
                <div class="condition-row">
                    <div class="condition-text">
                        <span id="conditionIcon" class="cond-icon"></span>
                        <span id="conditionText">--</span>
                    </div>
                    <div class="wind-metric">
                        <svg class="wx-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.59 4.59A2 2 0 1 1 11 8H2"/><path d="M12.59 19.41A2 2 0 1 0 14 16H2"/><path d="M17.73 7.73A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                        <span id="windSpeed">--</span> km/h
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-icon wx-icon--gold">
                            <svg class="wx-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="8 6 12 2 16 6"/></svg>
                        </span>
                        <div class="stat-text">
                            <span id="sunriseTime">--:--</span>
                            <div class="stat-label">Sunrise</div>
                        </div>
                    </div>

                    <div class="stat-item">
                        <span class="stat-icon wx-icon--gold">
                            <svg class="wx-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="16 5 12 9 8 5"/></svg>
                        </span>
                        <div class="stat-text">
                            <span id="sunsetTime">--:--</span>
                            <div class="stat-label">Sunset</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="forecast-list" id="forecastList">
            </div>

    </div>

    <script type="module" src="weather.js?v=__APP_VERSION__"></script>
</body>
</html>
